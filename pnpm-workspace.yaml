# pnpm 11：依赖 lifecycle 须显式批准，否则 CI 报 ERR_PNPM_IGNORED_BUILDS
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  vue-demi: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
minimumReleaseAgeExclude:
  - astro@7.1.3
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
