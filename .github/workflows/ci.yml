name: CI

# 质量门禁（不部署 Pages）。
# - 仅 main：push / 指向 main 的 PR / 手动跑
# - develop 推送不跑任何 Actions（避免失败邮件刷屏；发版前再合入 main 过门禁）
# - 部署见 deploy-pages.yml（仅 main，且须本 workflow 成功后才发版）
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_GIT_HOOKS: "0"

jobs:
  check:
    name: vp check / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # 官方推荐：统一安装 Vite+ / Node / 包管理，避免全局 npm i -g 与本地 vitest 双份冲突
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Check
        run: |
          set -euo pipefail
          echo "node=$(node -v)"
          vp --version || true
          vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp run build

      - name: Install Playwright Chromium
        run: vp exec playwright install chromium --with-deps

      - name: E2E + axe
        run: vp run test:e2e
        env:
          CI: true

      # 失败时保留 trace / 报告，避免「只见 exit 1」无法复盘
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
