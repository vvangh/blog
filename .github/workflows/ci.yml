name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_GIT_HOOKS: "0"

jobs:
  check:
    name: vp check / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - name: Setup Vite+
        run: |
          npm install -g vite-plus@0.2.4
          vp --version

      - name: Install
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp run build
